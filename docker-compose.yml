name: monorepo

services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://user:password@host:5432/db" # ganti sesuai punyamu
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:80"  # host:container port
    depends_on:
      - backend
    restart: unless-stopped
    command: sh -c "echo '🖥️ Frontend → http://localhost:5173'; nginx -g 'daemon off;'"